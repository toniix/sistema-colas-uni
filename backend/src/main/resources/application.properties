spring.application.name=sistema-colas-uni

# ==========================================
# CONFIGURACIÓN DE BASE DE DATOS (SQL Server)
# ==========================================

# URL de conexión. Reemplaza 'localhost:1433' si tu servidor está en otra dirección o puerto.
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=sistemascolasuni;encrypt=true;trustServerCertificate=true;}
# Credenciales de acceso. Reemplaza con tu usuario y contraseña de SQL Server locales.
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:your_local_password}


# Controlador JDBC de SQL Server (Driver)
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================

# Dialecto específico para SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Estrategia de inicialización de la base de datos (ddl-auto)
# 'update' creará y modificará las tablas automáticamente sin borrar los datos existentes.
spring.jpa.hibernate.ddl-auto=update

# Mostrar y formatear las consultas SQL generadas en la consola para depuración
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIGURACIÓN DE JWT
# ==========================================
# Llave secreta en hexadecimal de 256 bits (HMAC-SHA256)
application.security.jwt.secret-key=${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
# Expiración del token de acceso: 15 minutos (900000 ms)
application.security.jwt.expiration=900000
# Expiración del refresh token: 7 días (604800000 ms)
application.security.jwt.refresh-expiration=604800000

# ==========================================
# CONFIGURACIÓN DE SWAGGER / OPENAPI
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Timeout del hilo asíncrono de Spring MVC (para evitar cierres prematuros de SseEmitter)
spring.mvc.async.request-timeout=200000

# ==========================================
# OPTIMIZACIÓN DE CONEXIONES Y SSE
# ==========================================
# Deshabilitar OSIV para evitar que SSE retenga las conexiones SQL indefinidamente
spring.jpa.open-in-view=false

# Incrementar el pool de conexiones de base de datos para concurrencia
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

